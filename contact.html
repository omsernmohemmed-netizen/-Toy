<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اتصل بنا - ToyLand</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Tahoma', 'Arial', sans-serif;
      font-size: 18px;
      background: linear-gradient(135deg, #fff5f7, #ffe0e6);
      color: #333;
      line-height: 1.8;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #ff6b81, #ff4757);
      color: white;
      padding: 30px 15px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .logo {
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    nav {
      margin-top: 15px;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-size: 17px;
      margin: 0 12px;
      font-weight: 600;
      padding: 10px 15px;
      border-radius: 8px;
      display: inline-block;
      transition: all 0.3s ease;
    }

    nav a:hover,
    nav a.active {
      background: rgba(255, 255, 255, 0.25);
      transform: translateY(-2px);
    }

    .container {
      max-width: 750px;
      margin: 50px auto;
      padding: 40px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
    }

    h1 {
      color: #ff4757;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 16px;
    }

    .form-group {
      margin-bottom: 25px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
      font-size: 17px;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-family: 'Tahoma', sans-serif;
      font-size: 16px;
      resize: vertical;
      transition: all 0.3s ease;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: #ff4757;
      box-shadow: 0 0 10px rgba(255, 71, 87, 0.2);
    }

    textarea {
      min-height: 150px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ff6b81, #ff4757);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(255, 71, 87, 0.3);
    }

    button:active {
      transform: translateY(-1px);
    }

    .contact-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 40px;
      padding-top: 40px;
      border-top: 2px solid #f0f0f0;
    }

    .info-box {
      text-align: center;
      padding: 20px;
      background: #fff5f7;
      border-radius: 12px;
      transition: all 0.3s ease;
    }

    .info-box:hover {
      background: #ffe0e6;
      transform: translateY(-5px);
    }

    .info-title {
      color: #ff4757;
      font-weight: bold;
      margin-bottom: 8px;
      font-size: 17px;
    }

    .info-content {
      color: #666;
      font-size: 16px;
    }

    footer {
      background: #f8f8f8;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      color: #666;
      border-top: 2px solid #e0e0e0;
    }

    @media (max-width: 600px) {
      .container {
        margin: 20px 10px;
        padding: 25px;
      }

      h1 {
        font-size: 24px;
      }

      nav a {
        margin: 5px 8px;
        font-size: 16px;
      }

      .contact-info {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">🧸 ToyLand</div>
    <nav>
      <a href="index.html">الرئيسية</a>
      <a href="products.html">المنتجات</a>
      <a href="about.html">عنا</a>
      <a href="contact.html" class="active">اتصل بنا</a>
    </nav>
  </header>

  <div class="container">
    <h1>اتصل بنا</h1>
    <p class="subtitle">نحن هنا للإجابة على جميع استفساراتك</p>

    <form>
      <div class="form-group">
        <label for="name">الاسم الكامل *</label>
        <input type="text" id="name" name="name" required placeholder="أدخل اسمك">
      </div>

      <div class="form-group">
        <label for="email">البريد الإلكتروني *</label>
        <input type="email" id="email" name="email" required placeholder="example@email.com">
      </div>

      <div class="form-group">
        <label for="phone">رقم الهاتف</label>
        <input type="tel" id="phone" name="phone" placeholder="+966 50 000 0000">
      </div>

      <div class="form-group">
        <label for="subject">الموضوع *</label>
        <input type="text" id="subject" name="subject" required placeholder="موضوع الرسالة">
      </div>

      <div class="form-group">
        <label for="message">الرسالة *</label>
        <textarea id="message" name="message" required placeholder="اكتب رسالتك هنا..."></textarea>
      </div>

      <button type="submit">إرسال الرسالة</button>
    </form>

    <div class="contact-info">
      <div class="info-box">
        <div class="info-title">📍 العنوان</div>
        <div class="info-content">الرياض، المملكة العربية السعودية</div>
      </div>

      <div class="info-box">
        <div class="info-title">📞 الهاتف</div>
        <div class="info-content">+966 50 000 0000</div>
      </div>

      <div class="info-box">
        <div class="info-title">📧 البريد</div>
        <div class="info-content">info@toyland.com</div>
      </div>

      <div class="info-box">
        <div class="info-title">🕐 ساعات العمل</div>
        <div class="info-content">السبت - الخميس<br>9:00 - 21:00</div>
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; 2024 ToyLand - جميع الحقوق محفوظة</p>
  </footer>
</body>
</html>
