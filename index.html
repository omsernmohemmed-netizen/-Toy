<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>متجر ألعاب الأطفال - الرئيسية</title>
  <style>
    *{margin:0; padding:0; box-sizing:border-box}
    body{
      font-family: 'Segoe UI', Tahoma, sans-serif;
      font-size: 20px; /* الخط العام كبير */
      line-height: 1.8;
      background: #fff5f7;
      color: #333;
      text-align: center;
    }
    header{
      background: #ff6b81;
      color: white;
      padding: 25px 15px;
    }
    .logo{
      font-size: 32px; /* شعار كبير جدا */
      font-weight: bold;
      margin-bottom: 15px;
    }
    nav a{
      color: white;
      text-decoration: none;
      font-size: 20px; /* الروابط كبرت */
      margin: 0 10px;
      font-weight: bold;
      display: inline-block;
      padding: 8px;
    }
    nav a.active{
      border-bottom: 3px solid white;
    }
    .container{
      max-width: 700px;
      margin: 60px auto;
      padding: 20px;
    }
    h1{
      font-size: 48px; /* العنوان ضخم */
      color: #ff6b81;
      margin-bottom: 25px;
      line-height: 1.3;
    }
    p{
      font-size: 24px; /* النص كبير ومريح */
      color: #555;
      margin-bottom: 35px;
    }
    .btn{
      display: inline-block;
      background: #ff6b81;
      color: white;
      padding: 18px 40px;
      font-size: 22px; /* الزر كبير */
      font-weight: bold;
      border-radius: 15px;
      text-decoration: none;
      box-shadow: 0 4px 12px rgba(255,107,129,0.3);
    }
    footer{
      background: #ff6b81;
      color: white;
      text-align: center;
      padding: 25px;
      margin-top: 80px;
      font-size: 20px; /* الفوتر كبر */
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">🧸 ToyLand</div>
    <nav>
      <a href="index.html" class="active">الرئيسية</a>
      <a href="products.html">المنتجات</a>
      <a href="about.html">من نحن</a>
      <a href="contact.html">اتصل بنا</a>
      <a href="account.html">حسابي</a>
    </nav>
  </header>

  <div class="container">
    <h1>مرحباً بكم في متجر ألعاب الأطفال</h1>
    <p>أفضل الألعاب التعليمية والترفيهية للأطفال من عمر 0 إلى 12 سنة</p>
    <div>
      <a href="products.html" class="btn">تسوق الآن</a>
    </div>
  </div>

  <footer>© 2026 ToyLand - جميع الحقوق محفوظة</footer>
</body>
</html>
