<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المنتجات - ToyLand</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary-color: #ff6b81;
      --secondary-color: #ffa502;
      --dark-color: #ff4757;
      --light-bg: #fff5f7;
      --text-color: #333;
      --light-text: #666;
      --transition: 0.3s ease;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      font-size: 16px;
      background: var(--light-bg);
      color: var(--text-color);
      line-height: 1.8;
    }

    /* =================== HEADER =================== */
    header {
      background: linear-gradient(135deg, var(--primary-color), var(--dark-color));
      color: white;
      padding: 25px 15px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .logo {
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 15px;
      letter-spacing: 1px;
    }

    nav {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-size: 15px;
      padding: 10px 18px;
      font-weight: 600;
      border-radius: 8px;
      display: inline-block;
      transition: var(--transition);
      position: relative;
    }

    nav a:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }

    nav a.active {
      background: rgba(255, 255, 255, 0.25);
      border-bottom: 3px solid white;
    }

    /* =================== CONTAINER =================== */
    .container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      font-size: 48px;
      color: var(--primary-color);
      margin-bottom: 10px;
      text-align: center;
      font-weight: 700;
    }

    .subtitle {
      text-align: center;
      color: var(--light-text);
      margin-bottom: 30px;
      font-size: 16px;
    }

    /* =================== SEARCH BOX =================== */
    .search-box {
      text-align: center;
      margin-bottom: 30px;
    }

    .search-box input {
      padding: 14px 22px;
      font-size: 16px;
      width: 100%;
      max-width: 450px;
      border: 2px solid var(--primary-color);
      border-radius: 12px;
      text-align: right;
      transition: var(--transition);
      background: white;
      color: var(--text-color);
    }

    .search-box input:focus {
      outline: none;
      box-shadow: 0 0 15px rgba(255, 107, 129, 0.3);
      border-color: var(--dark-color);
      transform: scale(1.02);
    }

    .search-box input::placeholder {
      color: #ccc;
    }

    /* =================== FILTER BUTTONS =================== */
    .filter-section {
      background: white;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 30px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .filter-label {
      font-weight: 600;
      color: var(--primary-color);
      margin-bottom: 15px;
      display: block;
    }

    .filter-btns {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 12px 22px;
      background: white;
      border: 2px solid var(--primary-color);
      color: var(--primary-color);
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
    }

    .filter-btn:hover {
      background: var(--light-bg);
      transform: translateY(-3px);
      box-shadow: 0 4px 12px rgba(255, 107, 129, 0.2);
    }

    .filter-btn.active {
      background: linear-gradient(135deg, var(--primary-color), var(--dark-color));
      color: white;
      box-shadow: 0 6px 16px rgba(255, 107, 129, 0.3);
    }

    /* =================== PRODUCTS GRID =================== */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 28px;
      margin-bottom: 50px;
    }

    .product-card {
      background: white;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
      transition: var(--transition);
      text-align: center;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .product-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 12px 30px rgba(255, 107, 129, 0.25);
    }

    .product-img {
      width: 100%;
      height: 220px;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 90px;
      position: relative;
      overflow: hidden;
    }

    .product-img::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.1), transparent);
    }

    .product-info {
      padding: 22px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .product-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--dark-color);
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .product-desc {
      font-size: 14px;
      color: var(--light-text);
      margin-bottom: 15px;
      min-height: 45px;
      line-height: 1.5;
    }

    .product-price {
      font-size: 32px;
      font-weight: 800;
      color: var(--primary-color);
      margin: 15px 0;
      letter-spacing: 0.5px;
    }

    .product-age {
      font-size: 13px;
      background: linear-gradient(135deg, #fff0f5, #ffe4ea);
      color: var(--dark-color);
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 18px;
      font-weight: 600;
      border-left: 4px solid var(--primary-color);
    }

    .add-to-cart {
      background: linear-gradient(135deg, var(--primary-color), var(--dark-color));
      color: white;
      padding: 14px 28px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: var(--transition);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .add-to-cart:hover {
      transform: scale(1.08) translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 107, 129, 0.4);
    }

    .add-to-cart:active {
      transform: scale(0.95);
    }

    /* =================== CART INDICATOR =================== */
    .cart-indicator {
      position: fixed;
      bottom: 35px;
      left: 35px;
      background: linear-gradient(135deg, var(--primary-color), var(--dark-color));
      color: white;
      padding: 16px 28px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
      cursor: pointer;
      z-index: 100;
      transition: var(--transition);
      border: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .cart-indicator:hover {
      transform: scale(1.12) translateY(-3px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .cart-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: white;
      color: var(--primary-color);
      width: 30px;
      height: 30px;
      border-radius: 50%;
      font-weight: 800;
      font-size: 14px;
    }

    /* =================== FOOTER =================== */
    footer {
      background: linear-gradient(135deg, var(--primary-color), var(--dark-color));
      color: white;
      text-align: center;
      padding: 30px;
      margin-top: 60px;
      font-size: 15px;
      box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.1);
    }

    footer p {
      margin: 5px 0;
      font-weight: 500;
    }

    /* =================== NO RESULTS =================== */
    .no-results {
      text-align: center;
      font-size: 28px;
      color: var(--primary-color);
      padding: 60px 20px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
    }

    .no-results p {
      font-size: 18px;
      color: var(--light-text);
      margin-top: 15px;
    }

    /* =================== NOTIFICATION =================== */
    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      background: white;
      padding: 16px 24px;
      border-radius: 10px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
      z-index: 200;
      animation: slideIn 0.3s ease forwards;
      border-left: 4px solid var(--primary-color);
      max-width: 350px;
    }

    .notification.success {
      border-left-color: #2ed573;
    }

    .notification.success::before {
      content: '✅ ';
      color: #2ed573;
      font-weight: bold;
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* =================== RESPONSIVE =================== */
    @media (max-width: 768px) {
      .container {
        padding: 15px;
      }

      h1 {
        font-size: 36px;
      }

      .products-grid {
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 20px;
      }

      nav {
        gap: 5px;
      }

      nav a {
        font-size: 13px;
        padding: 8px 12px;
      }

      .logo {
        font-size: 28px;
      }

      .filter-btns {
        gap: 8px;
      }

      .filter-btn {
        padding: 10px 16px;
        font-size: 13px;
      }

      .cart-indicator {
        bottom: 20px;
        left: 20px;
        padding: 12px 20px;
        font-size: 14px;
      }
    }

    @media (max-width: 480px) {
      .products-grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 28px;
      }

      .product-img {
        height: 180px;
        font-size: 70px;
      }

      .product-price {
        font-size: 24px;
      }

      .search-box input {
        max-width: 100%;
        font-size: 16px;
      }

      header {
        padding: 15px 10px;
      }

      .logo {
        font-size: 24px;
        margin-bottom: 10px;
      }

      nav {
        gap: 4px;
      }

      nav a {
        font-size: 12px;
        padding: 6px 10px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">🧸 ToyLand</div>
    <nav>
      <a href="index.html">الرئيسية</a>
      <a href="products.html" class="active">المنتجات</a>
      <a href="about.html">من نحن</a>
      <a href="contact.html">اتصل بنا</a>
      <a href="account.html">حسابي</a>
      <a href="payment.html">الدفع</a>
    </nav>
  </header>

  <div class="container">
    <h1>🎮 جميع المنتجات</h1>
    <p class="subtitle">اختاري أفضل الألعاب لأطفالك</p>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="ابحثي عن لعبة...">
    </div>

    <div class="filter-section">
      <label class="filter-label">فلتري حسب الفئة العمرية:</label>
      <div class="filter-btns">
        <button class="filter-btn active" data-filter="all">🎯 الكل</button>
        <button class="filter-btn" data-filter="0-2">👶 من 0 لـ 2 سنة</button>
        <button class="filter-btn" data-filter="3-5">🧒 من 3 لـ 5 سنوات</button>
        <button class="filter-btn" data-filter="6-8">👦 من 6 لـ 8 سنوات</button>
        <button class="filter-btn" data-filter="9-12">🧑 من 9 لـ 12 سنة</button>
      </div>
    </div>

    <div class="products-grid" id="productsGrid">
      <!-- المنتجات ستظهر هنا من خلال JavaScript -->
    </div>

    <div id="noResults" class="no-results" style="display:none;">
      ❌
      <p>لم نجد منتجات تطابق بحثك</p>
    </div>
  </div>

  <button class="cart-indicator" onclick="goToCart()">
    <span class="cart-count" id="cartCount">0</span>
    🛒 السلة
  </button>

  <footer>
    <p>© 2026 ToyLand - جميع الحقوق محفوظة</p>
    <p>متجر الألعاب الآمنة والموثوقة للأطفال</p>
  </footer>

  <script>
    // =================== DATA ===================
    const products = [
      {
        id: 1,
        name: "دمية الدب الناعمة",
        category: "0-2",
        price: "₪100",
        emoji: "🧸",
        desc: "دمية ناعمة وآمنة للأطفال الصغار"
      },
      {
        id: 2,
        name: "كتاب الألوان",
        category: "0-2",
        price: "₪50",
        emoji: "📚",
        desc: "كتاب ملون مع أشكال بسيطة"
      },
      {
        id: 3,
        name: "مكعبات البناء",
        category: "3-5",
        price: "₪150",
        emoji: "🧱",
        desc: "مكعبات آمنة وسهلة الفك والتركيب"
      },
      {
        id: 4,
        name: "لعبة الدمى",
        category: "3-5",
        price: "₪200",
        emoji: "🎪",
        desc: "لعبة تفاعلية مع أصوات وألوان"
      },
      {
        id: 5,
        name: "لعبة البازل التعليمية",
        category: "3-5",
        price: "₪180",
        emoji: "🧩",
        desc: "لعبة تركيب الأشكال والألوان"
      },
      {
        id: 6,
        name: "دراجة ثلاثية الع��لات",
        category: "3-5",
        price: "₪450",
        emoji: "🚲",
        desc: "دراجة آمنة مع مقعد مريح"
      },
      {
        id: 7,
        name: "لعبة الكاراتيه والملاكم",
        category: "6-8",
        price: "₪250",
        emoji: "👊",
        desc: "لعبة تنمية المهارات الحركية"
      },
      {
        id: 8,
        name: "مجموعة الألوان والرسم",
        category: "6-8",
        price: "₪120",
        emoji: "🖍️",
        desc: "ألوان وأقلام رسم آمنة للأطفال"
      },
      {
        id: 9,
        name: "لعبة الشطرنج",
        category: "9-12",
        price: "₪300",
        emoji: "♟️",
        desc: "لعبة ذكاء وتركيز عالي"
      },
      {
        id: 10,
        name: "جيتار كهربائي للأطفال",
        category: "9-12",
        price: "₪500",
        emoji: "🎸",
        desc: "جيتار بسيط مع أصوات حقيقية"
      },
      {
        id: 11,
        name: "مجموعة الروبوت التعليم��",
        category: "9-12",
        price: "₪800",
        emoji: "🤖",
        desc: "روبوت برمجي لتعلم الكود"
      },
      {
        id: 12,
        name: "لعبة السلايم الملونة",
        category: "6-8",
        price: "₪80",
        emoji: "🟢",
        desc: "لعبة سلايم آمنة وممتعة"
      }
    ];

    let cart = [];
    let currentFilter = 'all';

    // =================== DISPLAY PRODUCTS ===================
    function displayProducts(productsToShow = products) {
      const grid = document.getElementById('productsGrid');
      const noResults = document.getElementById('noResults');

      if (productsToShow.length === 0) {
        grid.innerHTML = '';
        noResults.style.display = 'block';
        return;
      }

      noResults.style.display = 'none';
      grid.innerHTML = productsToShow
        .map(
          product => `
        <div class="product-card">
          <div class="product-img">${product.emoji}</div>
          <div class="product-info">
            <div>
              <div class="product-name">${product.name}</div>
              <div class="product-desc">${product.desc}</div>
              <div class="product-age">
                👶 ${getCategoryLabel(product.category)}
              </div>
              <div class="product-price">${product.price}</div>
            </div>
            <button class="add-to-cart" onclick="addToCart(${product.id})">
              أضيفي للسلة 🛒
            </button>
          </div>
        </div>
      `
        )
        .join('');
    }

    // =================== GET CATEGORY LABEL ===================
    function getCategoryLabel(cat) {
      const labels = {
        '0-2': 'من 0 لـ 2 سنة',
        '3-5': 'من 3 لـ 5 سنوات',
        '6-8': 'من 6 لـ 8 سنوات',
        '9-12': 'من 9 لـ 12 سنة'
      };
      return labels[cat] || 'جميع الأعمار';
    }

    // =================== ADD TO CART ===================
    function addToCart(id) {
      const product = products.find(p => p.id === id);
      if (product) {
        cart.push(product);
        updateCartCount();
        showNotification(`✅ تمت إضافة "${product.name}" للسلة!`);
      }
    }

    // =================== UPDATE CART COUNT ===================
    function updateCartCount() {
      document.getElementById('cartCount').textContent = cart.length;
    }

    // =================== GO TO CART ===================
    function goToCart() {
      if (cart.length === 0) {
        showNotification('🛒 السلة فارغة!', false);
      } else {
        const total = cart.reduce((sum, item) => {
          const price = parseInt(item.price.replace('₪', ''));
          return sum + price;
        }, 0);

        alert(`📦 لديكي ${cart.length} منتج في السلة\n\nالمجموع: ₪${total}`);
      }
    }

    // =================== SHOW NOTIFICATION ===================
    function showNotification(message, isSuccess = true) {
      const notification = document.createElement('div');
      notification.className = `notification ${isSuccess ? 'success' : ''}`;
      notification.textContent = message;
      document.body.appendChild(notification);

      setTimeout(() => {
        notification.style.animation = 'slideIn 0.3s ease reverse forwards';
        setTimeout(() => notification.remove(), 300);
      }, 2500);
    }

    // =================== SEARCH ===================
    document.getElementById('searchInput').addEventListener('input', function (e) {
      const query = e.target.value.toLowerCase();
      let filtered = products;

      if (query.trim()) {
        filtered = products.filter(p => p.name.includes(query) || p.desc.includes(query));
      }

      if (currentFilter !== 'all') {
        filtered = filtered.filter(p => p.category === currentFilter);
      }

      displayProducts(filtered);
    });

    // =================== FILTER BY AGE ===================
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', function () {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');

        currentFilter = this.getAttribute('data-filter');
        const searchQuery = document.getElementById('searchInput').value.toLowerCase();

        let filtered = products;

        if (currentFilter === 'all') {
          filtered = products;
        } else {
          filtered = products.filter(p => p.category === currentFilter);
        }

        if (searchQuery.trim()) {
          filtered = filtered.filter(p => p.name.includes(searchQuery) || p.desc.includes(searchQuery));
        }

        displayProducts(filtered);
      });
    });

    // =================== INIT ===================
    displayProducts();
  </script>
</body>
</html>
